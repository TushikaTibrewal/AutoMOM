# Render blueprint — provisions the backend + Postgres in one shot.
# Deploy: Render dashboard -> New -> Blueprint -> pick the AutoMOM repo.
# Render reads this file, builds the Docker backend, and creates the database.
services:
  - type: web
    name: automom-backend
    runtime: docker
    dockerfilePath: ./docker/backend.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: automom-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true          # Render generates a strong 256-bit secret
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PDF_ENGINE
        value: weasyprint            # GTK libs are in the Docker image
      - key: AI_PROVIDER
        value: auto                  # mock extractor until a key is added
      - key: OPENAI_API_KEY
        sync: false                  # set in dashboard if using OpenAI
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://auto-mom-nine.vercel.app
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: AutoMOM

databases:
  - name: automom-db
    plan: free
    databaseName: automom
    user: automom
