services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: automom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-automom}
      POSTGRES_DB: automom
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automom"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://automom:${POSTGRES_PASSWORD:-automom}@db:5432/automom
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - exports:/app/exports
      - ./backend/templates:/app/templates
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  exports:
